<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>nuntius Docs</title>
  <style>
    :root {
      --bg: #f3efe5;
      --panel: #fffdf8;
      --text: #1b1d1c;
      --muted: #5f645f;
      --line: #dad3c7;
      --accent: #14532d;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 1.25rem;
      background:
        radial-gradient(circle at top right, rgba(20, 83, 45, 0.08), transparent 24rem),
        linear-gradient(180deg, #f8f4ea 0%, var(--bg) 100%);
      color: var(--text);
      font-family: Georgia, "Times New Roman", serif;
    }

    main {
      width: min(42rem, 100%);
      padding: 2rem;
      border: 1px solid var(--line);
      border-radius: 20px;
      background: var(--panel);
      box-shadow: 0 18px 45px rgba(25, 31, 28, 0.06);
    }

    h1 {
      margin: 0 0 0.75rem;
      font-size: clamp(2rem, 5vw, 3rem);
      line-height: 1.1;
    }

    p {
      font-size: 1.05rem;
      line-height: 1.7;
    }

    a {
      color: var(--accent);
      font-weight: 600;
    }
  </style>
</head>
<body>
  <main>
    <h1>nuntius docs</h1>
    <p>
      Public documentation for the nuntius Chrome extension.
    </p>
    <p>
      Privacy policy: <a href="./privacy/">/privacy/</a>
    </p>
  </main>
</body>
</html>
